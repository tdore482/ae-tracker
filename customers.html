<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers · AE Tracker</title>
<meta name="description" content="Manage your customer database – add, edit and track customer order history.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.customer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
  padding: 1.5rem;
}
.customer-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  transition: border-color 0.15s, box-shadow 0.15s;
  background: var(--surface);
  position: relative;
}
.customer-card:hover { border-color: var(--border-md); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.customer-card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.customer-av {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; color: #fff;
  flex-shrink: 0;
}
.customer-name   { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
.customer-phone  { font-size: 12px; color: var(--muted); }
.customer-meta   { display: flex; gap: 12px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; }
.customer-meta-item strong { display: block; font-size: 14px; font-weight: 600; color: var(--text); font-family: 'DM Serif Display', serif; }
.customer-actions { position: absolute; top: 1rem; right: 1rem; display: flex; gap: 4px; }
.view-mode-btns { display: flex; gap: 4px; }
.view-btn { padding: 6px 8px; border: 1px solid var(--border-md); border-radius: 6px; cursor: pointer; background: var(--bg); color: var(--muted); transition: all 0.15s; }
.view-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
</style>
</head>
<body>

<!-- SIDEBAR -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar">
  <a class="logo" href="index.html">AE<span>.</span> Tracker</a>
  <div class="nav-section">Main</div>
  <a class="nav-item" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a class="nav-item" href="orders.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Orders
  </a>
  <a class="nav-item active" href="customers.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    Customers
  </a>
  <a class="nav-item" href="deliveries.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
    Deliveries
  </a>
  <div class="nav-divider"></div>
  <div class="nav-section">Reports</div>
  <a class="nav-item" href="revenue.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Revenue
  </a>
  <a class="nav-item" href="settings.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Settings
  </a>
  <div class="sidebar-footer">
    <div class="avatar" id="sidebarAvatar">AE</div>
    <div class="avatar-info" style="flex:1;min-width:0">
      <div class="name" id="sidebarName">Admin</div>
      <div class="role" id="sidebarBranch" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Campus Branch</div>
    </div>
    <button onclick="DB.logout(); window.location.href='login.html'" title="Logout" style="cursor:pointer;border:none;background:transparent;color:var(--muted);padding:4px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>

<main class="main">
  <header class="topbar">
      <div class="topbar-left" style="display:flex;align-items:center;">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-title">Customers</div>
      </div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openNewCustomer()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Customer
      </button>
    </div>
  </header>

  <div class="content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Customer Directory</h1>
        <p id="custCount">Loading...</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="searchInput" placeholder="Search name, phone…" oninput="applyFilters()">
        </div>
        <div class="view-mode-btns">
          <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grid view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="listBtn" onclick="setView('list')" title="List view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="section-card">
      <div id="customerContainer"></div>
    </div>
  </div>
</main>

<!-- CUSTOMER MODAL -->
<div class="modal-overlay" id="customerModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Customer</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label class="form-label">Full Name *</label>
        <input class="form-input" id="c-name" placeholder="Customer full name">
      </div>
      <div class="form-field">
        <label class="form-label">Phone</label>
        <input class="form-input" id="c-phone" placeholder="265 8XX XXX XXX">
      </div>
      <div class="form-field">
        <label class="form-label">Location</label>
        <input class="form-input" id="c-location" placeholder="Campus, Town, etc." value="Campus">
      </div>
      <div class="form-field">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="c-notes" placeholder="Any notes about this customer..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSubmitBtn" onclick="submitCustomer()">Add Customer</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-body">
      <div class="confirm-title">Delete Customer</div>
      <div class="confirm-msg">Are you sure you want to delete this customer? Their order history will remain.</div>
    </div>
    <div class="confirm-footer">
      <button class="btn" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="db.js"></script>
<script>
const AV_COLORS = ['#C4622D','#2563EB','#059669','#7C3AED','#DB2777','#0891B2','#D97706'];
let filtered = [], editingId = null, deletingId = null, viewMode = 'grid';

function fmt(n) { return 'MK ' + Number(n).toLocaleString(); }

async function getOrderStats() {
  const orders = await DB.getOrders();
  const stats  = {};
  orders.forEach(o => {
    const key = o.customer !== 'Unknown' ? o.customer : (o.phone !== '—' ? o.phone : null);
    if (!key) return;
    if (!stats[key]) stats[key] = { count:0, total:0, lastDate:'' };
    stats[key].count++;
    stats[key].total += o.amount;
    if (!stats[key].lastDate || o.date > stats[key].lastDate) stats[key].lastDate = o.date;
  });
  return stats;
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('gridBtn').classList.toggle('active', mode==='grid');
  document.getElementById('listBtn').classList.toggle('active', mode==='list');
  render();
}

async function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = await DB.getCustomers();
  if (q) list = list.filter(c =>
    c.name.toLowerCase().includes(q) || (c.phone||'').includes(q) || (c.location||'').toLowerCase().includes(q)
  );
  filtered = list;
  document.getElementById('custCount').textContent = `${list.length} customer${list.length!==1?'s':''}`;
  render();
}

async function render() {
  const stats = await getOrderStats();
  if (viewMode === 'grid') {
    document.getElementById('customerContainer').innerHTML = filtered.length
      ? `<div class="customer-grid">${filtered.map((c,i) => {
          const key = c.name !== 'Unknown' ? c.name : (c.phone !== '—' ? c.phone : 'Unknown');
          const s   = stats[key] || { count:0, total:0 };
          const ini = c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || '?';
          return `
          <div class="customer-card fade" style="animation-delay:${i*0.04}s">
            <div class="customer-actions">
              <button class="btn btn-sm btn-icon" onclick="openEdit(${c.id})" title="Edit">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="btn btn-sm btn-icon" onclick="openConfirm(${c.id})" title="Delete" style="color:var(--danger)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
              </button>
            </div>
            <div class="customer-card-header">
              <div class="customer-av" style="background:${AV_COLORS[i%AV_COLORS.length]}">${ini}</div>
              <div>
                <div class="customer-name">${c.name}</div>
                <div class="customer-phone">${c.phone||'—'}</div>
                <div style="font-size:11px;color:var(--muted)">${c.location||'—'}</div>
              </div>
            </div>
            <div class="customer-meta">
              <div class="customer-meta-item"><strong>${s.count}</strong> Orders</div>
              <div class="customer-meta-item"><strong>${fmt(s.total)}</strong> Spent</div>
            </div>
          </div>`;
        }).join('')}</div>`
      : '<div class="empty-state" style="padding:3rem"><p>No customers found</p></div>';
  } else {
    document.getElementById('customerContainer').innerHTML = `
      <table class="data-table">
        <thead><tr>
          <th>Customer</th><th>Phone</th><th>Location</th>
          <th>Orders</th><th>Total Spent</th><th>Notes</th><th>Actions</th>
        </tr></thead>
        <tbody>${filtered.length ? filtered.map((c,i) => {
          const key = c.name !== 'Unknown' ? c.name : (c.phone !== '—' ? c.phone : 'Unknown');
          const s   = stats[key] || { count:0, total:0 };
          return `<tr>
            <td class="td-name">${c.name}</td>
            <td class="td-muted">${c.phone||'—'}</td>
            <td class="td-muted">${c.location||'—'}</td>
            <td class="td-muted">${s.count}</td>
            <td class="td-amount">${fmt(s.total)}</td>
            <td class="td-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.notes||'—'}</td>
            <td><div style="display:flex;gap:4px">
              <button class="btn btn-sm btn-icon" onclick="openEdit(${c.id})">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="btn btn-sm btn-icon" onclick="openConfirm(${c.id})" style="color:var(--danger)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
              </button>
            </div></td>
          </tr>`;
        }).join('') : '<tr><td colspan="7"><div class="empty-state"><p>No customers found</p></div></td></tr>'}</tbody>
      </table>`;
  }
}

function openNewCustomer() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add Customer';
  document.getElementById('modalSubmitBtn').textContent = 'Add Customer';
  ['c-name','c-phone','c-notes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('c-location').value = 'Campus';
  document.getElementById('customerModal').classList.add('open');
}

async function openEdit(id) {
  const customers = await DB.getCustomers();
  const c = customers.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Customer';
  document.getElementById('modalSubmitBtn').textContent = 'Save Changes';
  document.getElementById('c-name').value     = c.name;
  document.getElementById('c-phone').value    = c.phone||'';
  document.getElementById('c-location').value = c.location||'Campus';
  document.getElementById('c-notes').value    = c.notes||'';
  document.getElementById('customerModal').classList.add('open');
}

function closeModal() { document.getElementById('customerModal').classList.remove('open'); }

async function submitCustomer() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) { showToast('Name is required', 'danger'); return; }
  const data = {
    name,
    phone:    document.getElementById('c-phone').value.trim() || '—',
    location: document.getElementById('c-location').value.trim() || 'Campus',
    notes:    document.getElementById('c-notes').value.trim(),
  };
  if (editingId) {
    await DB.updateCustomer(editingId, data);
    showToast('Customer updated', 'success');
  } else {
    await DB.addCustomer(data);
    showToast('Customer added', 'success');
  }
  closeModal();
  await applyFilters();
}

function openConfirm(id)  { deletingId = id; document.getElementById('confirmOverlay').classList.add('open'); }
function closeConfirm()   { deletingId = null; document.getElementById('confirmOverlay').classList.remove('open'); }
async function confirmDelete()  {
  await DB.deleteCustomer(deletingId);
  showToast('Customer removed');
  closeConfirm();
  await applyFilters();
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' toast-'+type:'');
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.className='toast'; }, 2800);
}

(async () => {
  await DB.ready;
  const user = DB.getCurrentUser();
  if (!user) window.location.href = 'login.html';
  else if (user.role === 'courier') window.location.href = 'courier_dashboard.html';

  const s = await DB.getSettings();
  document.getElementById('sidebarName').textContent   = s.adminName||'Admin';
  document.getElementById('sidebarBranch').textContent = s.branch||'Campus Branch';
  document.getElementById('sidebarAvatar').textContent = (s.adminName||'AE').slice(0,2).toUpperCase();

  await applyFilters();
})();
</script>
</body>
</html>
