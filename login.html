<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · AE Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sidebar);
      min-height: 100vh;
    }
    .login-container {
      background: var(--surface);
      border: 1px solid var(--border-md);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      text-align: center;
    }
    .login-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      margin-bottom: 0.5rem;
    }
    .login-logo span { color: var(--accent); }
    .login-sub {
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: 14px;
    }
    .role-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .role-card {
      border: 1px solid var(--border-md);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .role-card:hover {
      border-color: var(--text);
      background: rgba(0,0,0,0.02);
    }
    .role-card.selected {
      border-color: var(--text);
      background: var(--text);
      color: #fff;
    }
    .role-card.selected .role-desc { color: rgba(255,255,255,0.7); }
    .role-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--sidebar);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--text);
    }
    .role-card.selected .role-icon { background: rgba(255,255,255,0.2); color: #fff; }
    .role-info { flex: 1; }
    .role-name { font-weight: 500; font-size: 14px; }
    .role-desc { font-size: 12px; color: var(--muted); }
    
    .courier-select-wrap {
      display: none;
      margin-top: 1rem;
      text-align: left;
    }
    .courier-select-wrap.open { display: block; animation: fadeIn 0.2s ease; }
    .btn-login { width: 100%; padding: 12px; font-size: 14px; margin-top: 1rem; }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-logo">AE<span>.</span> Tracker</div>
    <div class="login-sub">Welcome back, please select your role</div>

    <div class="role-grid">
      <div class="role-card selected" id="roleAdmin" onclick="selectRole('admin')">
        <div class="role-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="role-info">
          <div class="role-name">Administrator</div>
          <div class="role-desc">Full access to dashboard</div>
        </div>
      </div>

      <div class="role-card" id="roleCourier" onclick="selectRole('courier')">
        <div class="role-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
        </div>
        <div class="role-info">
          <div class="role-name">Delivery Team</div>
          <div class="role-desc">Manage your deliveries</div>
        </div>
      </div>
    </div>

    <div class="courier-select-wrap" id="courierWrap">
      <div class="form-field">
        <label class="form-label">Select Courier Profile</label>
        <select class="form-select" id="courierSelect"></select>
      </div>
    </div>

    <div class="form-field" style="margin-top:1rem; text-align:left;">
      <label class="form-label">Passcode</label>
      <input type="password" class="form-input" id="passcode" placeholder="Enter passcode" onkeydown="if(event.key==='Enter')login()">
    </div>

    <button class="btn btn-primary btn-login" onclick="login()">Continue to Dashboard</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="db.js"></script>
  <script>
    let selectedRole = 'admin';

    async function initCouriers() {
      const couriers = (await DB.getCouriers()).filter(c => c.active);
      document.getElementById('courierSelect').innerHTML = couriers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('roleAdmin').classList.remove('selected');
      document.getElementById('roleCourier').classList.remove('selected');
      if (role === 'admin') {
        document.getElementById('roleAdmin').classList.add('selected');
        document.getElementById('courierWrap').classList.remove('open');
      } else {
        document.getElementById('roleCourier').classList.add('selected');
        document.getElementById('courierWrap').classList.add('open');
      }
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type ? ' toast-' + type : '');
      clearTimeout(t._t);
      t._t = setTimeout(() => { t.className = 'toast'; }, 2800);
    }

    async function login() {
      const passcode = document.getElementById('passcode').value;
      if (selectedRole === 'admin') {
        const settings = await DB.getSettings();
        const adminPasscode = settings.adminPasscode || '0000';
        if (passcode !== adminPasscode) return showToast('Incorrect passcode', 'danger');
        DB.login({ role: 'admin' });
        window.location.href = 'index.html';
      } else {
        const sel = document.getElementById('courierSelect');
        const courierId = parseInt(sel.value);
        if (!courierId) return showToast('No courier selected', 'danger');
        const couriers = await DB.getCouriers();
        const courier = couriers.find(c => c.id === courierId);
        const correctPass = courier.passcode || '0000';
        if (passcode !== correctPass) return showToast('Incorrect passcode', 'danger');
        DB.login({ role: 'courier', id: courierId, name: sel.options[sel.selectedIndex].text });
        window.location.href = 'courier_dashboard.html';
      }
    }

    (async () => {
      await DB.ready;
      const currentUser = DB.getCurrentUser();
      if (currentUser) {
        window.location.href = currentUser.role === 'admin' ? 'index.html' : 'courier_dashboard.html';
      }
      await initCouriers();
    })();
  </script>
</body>
</html>
